    aarch64: 53cfa1de79155f27643014a84f1de94e2185239726b179b5c30523d62e565bb0
    x86_64: 0fb3d2b72414ab862d68517f0b17b78c93c149d1c5c461acb969aacde1a2189d
  docker_rootless_release:
