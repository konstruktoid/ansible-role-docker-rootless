    x86_64: 63da589dc7fbbe252bbd70265f576a12c3372bbc47d8d21bcffd0ff7994fcce5
  docker_compose_release:
    aarch64: 4b5c42952b7dd81f508d01a771df2a9e5dbffe9b8c5c7d983e738504ad38f056
