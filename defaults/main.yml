    aarch64: d1d9cb857c32c596ea96a9ca6b25d13621a97c83511e667868a33a320b2a707f
    x86_64: 6d81a5be56232d9cc047e60b7110a087793536ae5a8b465719cd303f05fc56ec
  docker_rootless_release:
